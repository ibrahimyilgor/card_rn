<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="sh" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#sh)"/>

  <!--
    D shape with rotated-M cutout via even-odd.
    M (90° rotated, pointing right) has this profile on the left edge:
      top-left corner → go right → dip down to V1 → go right → dip down to V2 → go right → bottom-left corner
    Two triangular notches cut from the left side.
    Notch 1: top area,  tip at (27, 26)
    Notch 2: bottom area, tip at (27, 38)
  -->
  <path fill-rule="evenodd" fill="white" opacity="0.95" d="
    M15 19 Q15 15 19 15
    L32 15 A17 17 0 0 1 32 49
    L19 49 Q15 49 15 45 Z

    M15 19 L28 25 L15 31 Z
    M15 33 L28 39 L15 45 Z
  "/>
</svg>
